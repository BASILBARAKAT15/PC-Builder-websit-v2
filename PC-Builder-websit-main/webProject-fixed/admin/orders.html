<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSSPage/global.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header"><h2>🖥️ PC Builder</h2><p>Admin Panel</p></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="orders.html" class="active"><span class="nav-icon">📦</span> Orders</a>
            <a href="users.html"><span class="nav-icon">👥</span> Users</a>
            <a href="products.html"><span class="nav-icon">🛍️</span> Products</a>
            <a href="coupons.html"><span class="nav-icon">🎟️</span> Coupons</a>
            <a href="../HTMLPage/index.html"><span class="nav-icon">🌐</span> View Store</a>
        </nav>
        <div class="sidebar-logout"><button onclick="adminLogout()">🚪 Logout</button></div>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1>📦 Orders Management</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="admin-table-container">
            <div class="admin-table-header">
                <h2>All Orders</h2>
                <span id="orderCount"></span>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Shipping</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<script src="../Js/api.js"></script>
<script src="../Js/utils.js"></script>
<script src="admin.js"></script>
<script>
    checkAdminAccess();
    loadOrders();
</script>
</body>
</html>
