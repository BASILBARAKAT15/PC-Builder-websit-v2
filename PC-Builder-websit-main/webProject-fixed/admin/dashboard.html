<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PC Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSSPage/global.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div class="admin-layout">
    
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <h2>🖥️ PC Builder</h2>
            <p>Admin Panel</p>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="active">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a href="orders.html">
                <span class="nav-icon">📦</span> Orders
            </a>
            <a href="users.html">
                <span class="nav-icon">👥</span> Users
            </a>
            <a href="products.html">
                <span class="nav-icon">🛍️</span> Products
            </a>
            <a href="coupons.html">
                <span class="nav-icon">🎟️</span> Coupons
            </a>
            <a href="../HTMLPage/index.html">
                <span class="nav-icon">🌐</span> View Store
            </a>
        </nav>
        <div class="sidebar-logout">
            <button onclick="adminLogout()">🚪 Logout</button>
        </div>
    </aside>

    
    <main class="admin-main">
        <div class="admin-header">
            <h1>📊 Dashboard</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
        </div>

        
        <div class="stats-grid" id="statsGrid"></div>

        
        <div class="admin-table-container">
            <div class="admin-table-header">
                <h2>Recent Orders</h2>
                <a href="orders.html" class="btn btn-primary" style="font-size:13px;">View All</a>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="recentOrders"></tbody>
            </table>
        </div>

        
        <div class="admin-table-container">
            <div class="admin-table-header">
                <h2>Recent Users</h2>
                <a href="users.html" class="btn btn-primary" style="font-size:13px;">View All</a>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody id="recentUsers"></tbody>
            </table>
        </div>
    </main>
</div>

<script src="../Js/api.js"></script>
<script src="../Js/utils.js"></script>
<script src="admin.js"></script>
<script>
    checkAdminAccess();
    loadDashboard();
</script>
</body>
</html>
