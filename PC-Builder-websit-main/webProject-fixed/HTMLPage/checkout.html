<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
    var t = localStorage.getItem('theme');
    if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout - PC Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../CSSPage/global.css">
<link rel="stylesheet" href="../CSSPage/checkout.css">
</head>

<body>

<header class="navbar"></header>
<script src="../Js/api.js"></script>
<script src="../Js/utils.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => generateNavbar(''));
</script>

<section class="section-box">
    <h1>Secure Checkout 💳</h1>

    <div class="checkout-grid">

        <!-- Payment Form -->
        <div class="checkout-card">
            <h2>Visa Payment</h2>

            <input type="text" id="cardName" class="search-input" placeholder="Cardholder Name">
            <input type="text" id="address" class="search-input" placeholder="Shipping Address">
            <input type="text" id="cardNumber" class="search-input" placeholder="Card Number (16 digits)" maxlength="16">

            <div class="form-row">
                <input type="text" id="expiry" class="search-input" placeholder="MM/YY" maxlength="5">
                <input type="password" id="cvv" class="search-input" placeholder="CVV" maxlength="3">
            </div>

            <button class="btn btn-primary pay-btn">Pay Now</button>

            <p id="paymentMessage"></p>
        </div>

        <!-- Order Summary -->
        <div class="checkout-card">
            <h2>Order Summary</h2>
            <div id="summaryItems"></div>
            <h3 id="summaryTotal"></h3>
        </div>

    </div>
</section>

<footer class="footer">
    <p>© 2026 PC Builder. All rights reserved.</p>
</footer>

<script src="../Js/checkout.js"></script>
</body>
</html>
